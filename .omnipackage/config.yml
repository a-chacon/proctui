# omnipackage configuration. Docs: https://docs.omnipackage.org
#
# Before publishing (not needed for local builds):
#   1. Generate a GPG key: omnipackage gpg generate -n "Oleg Antonyan" -e oleg.b.antonyan@gmail.com --format base64
#      Put the printed value into GPG_KEY (e.g. in .env).
#   2. Configure a real repository below.

# Reads the version from Cargo.toml [package]. Anchored to line start so it
# ignores the indented `version = ` lines inside dependency tables.
version_extractors:
  - name: default
    provider: "file"
    file:
      file: "Cargo.toml"
      regex: '(?m)^version = "([^"]+)"'

common: &common
  package_name: "procman"
  maintainer: "Oleg Antonyan <oleg.b.antonyan@gmail.com>"
  homepage: "https://github.com/a-chacon/procman"
  description: "Terminal UI for managing Procfile-based applications"

ignore_source_files:
  - .git
  - .env
  - .DS_Store
  - "*.log"
  - /target

repositories:
  - name: R2 test repo
    provider: s3
    gpg_private_key_base64: "${GPG_PRIVATE_KEY_BASE64}"
    <<: *common
    s3:
      bucket: repositories-test
      path_in_bucket: "procman"
      bucket_public_url: "https://repositories-test.omnipackage.org"
      endpoint: "${CLOUDFLARE_R2_ENDPOINT}"
      access_key_id: "${CLOUDFLARE_R2_ACCESS_KEY_ID}"
      secret_access_key: "${CLOUDFLARE_R2_SECRET_ACCESS_KEY}"
      region: auto
      force_path_style: true
      cloudflare_zone_id: "${CLOUDFLARE_ZONE_ID}"
      cloudflare_api_token: "${CLOUDFLARE_API_TOKEN}"

  - name: Local test
    gpg_private_key_base64: "${GPG_PRIVATE_KEY_BASE64}"
    provider: localfs
    <<: *common
    localfs:
      path: "/run/media/oleg/c3996ce0-a379-4403-9d64-7d4c0536463f/dev/omnipackage-repos/procman"


# Edition 2024 needs rustc >= 1.85, newer than several distros ship. install_rust.sh
# keeps the distro toolchain when it's new enough, else downloads a current one.

# Fedora / openSUSE: ship rust; install_rust.sh upgrades it only if too old.
rpm: &rpm
  <<: *common
  build_dependencies: ["rust", "cargo", "gcc"]
  before_build_script: ".omnipackage/install_rust.sh"
  rpm:
    spec_template: ".omnipackage/specfile.spec.liquid"

# RHEL clones / Mageia: rust is absent or too old; install_rust.sh downloads it.
el: &el
  <<: *common
  build_dependencies: ["curl", "gcc", "make"]
  before_build_script: ".omnipackage/install_rust.sh"
  rpm:
    spec_template: ".omnipackage/specfile.spec.liquid"

# Debian/Ubuntu: apt cargo is too old; install_rust.sh downloads a current one.
deb: &deb
  <<: *common
  build_dependencies: ["curl", "build-essential"]
  before_build_script: ".omnipackage/install_rust.sh"
  deb:
    debian_templates: ".omnipackage/deb"

# Arch / Manjaro: distro rust is always current; build straight from PKGBUILD.
pacman: &pacman
  <<: *common
  build_dependencies: ["rust"]
  pacman:
    pkgbuild_template: ".omnipackage/PKGBUILD.liquid"

builds:
  - { distro: "fedora_42", <<: *rpm }
  - { distro: "fedora_43", <<: *rpm }
  - { distro: "fedora_44", <<: *rpm }
  - { distro: "opensuse_tumbleweed", <<: *rpm }
  - { distro: "opensuse_15.6", <<: *rpm }
  - { distro: "opensuse_16.0", <<: *rpm }
  - { distro: "debian_12", <<: *deb }
  - { distro: "debian_13", <<: *deb }
  - { distro: "ubuntu_22.04", <<: *deb }
  - { distro: "ubuntu_24.04", <<: *deb }
  - { distro: "ubuntu_26.04", <<: *deb }
  - { distro: "arch", <<: *pacman }
  - { distro: "manjaro", <<: *pacman }
  - { distro: "almalinux_9", <<: *el }
  - { distro: "almalinux_10", <<: *el }
  - { distro: "rockylinux_9", <<: *el }
  - { distro: "rockylinux_10", <<: *el }
  - { distro: "mageia_9", <<: *el }
